id: "001-bootstrap"
type: story
priority: high
status: queued
assigned_to: genesis
created_by: human
context: |
  Bootstrap the colony's first real project. Choose a meaningful starter project
  that demonstrates the colony's full capabilities:

  Build a CLI tool called "colony-cli" that:
  1. Shows colony status (which agents are running, task queue depth)
  2. Creates and assigns tasks to agents
  3. Views task history and agent logs
  4. Pauses/resumes the colony
  5. Shows a live dashboard of agent activity

  Tech stack: TypeScript, Node.js, commander.js for CLI, chalk for colors.
  The tool should read from _colony/ directory structure.

acceptance_criteria:
  - "colony status" shows all 4 agents and their state
  - "colony task create --type story --assign genesis --context '...'" creates a task YAML
  - "colony logs sentinel" shows sentinel's recent findings
  - "colony pause" / "colony resume" toggles the PAUSE file
  - "colony dashboard" shows a live-updating TUI
  - All commands have --help
  - Tests cover every command
