# Colony Task Format
# id: unique task ID (auto-generated UUID)
# type: story | bug | review | architecture | test | deploy
# priority: critical | high | medium | low
# status: queued | in-progress | review | done | blocked
# assigned_to: genesis | sentinel | forge | oracle
# created_by: genesis | sentinel | forge | oracle | human
# branch: git branch name
# dependencies: list of task IDs that must complete first
# context: free-form context for the agent
# acceptance_criteria: list of conditions for completion

# Example:
# ---
# id: task-001
# type: story
# priority: high
# status: queued
# assigned_to: genesis
# created_by: human
# context: "Build user authentication with JWT tokens"
# acceptance_criteria:
#   - Login endpoint returns JWT
#   - Refresh token rotation works
#   - Tests cover happy path and error cases
